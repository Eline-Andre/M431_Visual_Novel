<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Novel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body onload="init()">
  <div id="game" onclick="changeDialogue()">
    <div id="background"></div>

    <div id="menu">
      <div><h2 id="day"></h2></div>

      <div id="house">
        <button id="parking" class="room" onclick="chooseRoom('Parking')">Parking</button>
        <button id="entree" class="room" onclick="chooseRoom('Entrée maison')">Entrée maison</button>
        <button id="hall" class="room" onclick="chooseRoom('Hall')">Hall</button> 
        <button id="couloir" class="room" onclick="chooseRoom('Couloir')">Couloir</button>
        <button id="salon" class="room" onclick="chooseRoom('Salon')">Salon</button>
        <button id="cuisine" class="room" onclick="chooseRoom('Cuisine')">Cuisine</button>
        <button id="chambre1" class="room" onclick="chooseRoom('Chambre 1')">Chambre 1</button>
        <button id="chambre2" class="room" onclick="chooseRoom('Chambre 2')">Chambre 2</button>
        <button id="chambre3" class="room" onclick="chooseRoom('Chambre 3')">Chambre 3</button>
        <button id="terrasse" class="room" onclick="chooseRoom('Terrasse')">Terrasse</button>
      </div>

      <div id="town">
        <button id="magasin1" class="room" onclick="chooseRoom('Magasin électronique')">Magasin électronique</button>
        <button id="magasin2" class="room" onclick="chooseRoom('Magasin de vêtements')">Magasin de vêtements</button>
        <button id="restaurant" class="room" onclick="chooseRoom('Restaurant')">Restaurant</button>
      </div>
    </div>

    <img id="sprite" src="" alt="">

    <div id="choose">
      <button id="chooseDenounce" class="choose" onclick="finalChoice('chooseDenounce')">Dénoncer</button>
      <button id="chooseSilence" class="choose"onclick="finalChoice('chooseSilence')">Ne rien dire</button>
    </div>
    
    <div id="dialogue-box">
      <div id="speaker"></div>
      <div id="text"></div>
    </div>

  </div>

  <script src="js/dialogues.js"></script>
  <script src="js/game.js"></script>

</body>
</html>
